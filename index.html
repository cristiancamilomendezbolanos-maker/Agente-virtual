<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gemini 3.5 Chat Test</title>
  <style>
    :root {
      --bg-color: #f4f7f6;
      --chat-bg: #ffffff;
      --user-msg-bg: #2563eb;
      --user-msg-text: #ffffff;
      --bot-msg-bg: #f1f5f9;
      --bot-msg-text: #334155;
      --input-bg: #ffffff;
      --border-color: #e2e8f0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Cabecera */
    header {
      background-color: var(--chat-bg);
      padding: 15px 20px;
      border-bottom: 1px solid var(--border-color);
      text-align: center;
      font-weight: 700;
      color: #1e293b;
      font-size: 18px;
    }

    #status {
      font-size: 12px;
      color: #64748b;
      font-weight: 400;
    }

    /* Área de Chat */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      position: relative;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background-color: var(--user-msg-bg);
      color: var(--user-msg-text);
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background-color: var(--bot-msg-bg);
      color: var(--bot-msg-text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .typing-indicator {
      font-style: italic;
      color: #94a3b8;
      font-size: 13px;
      margin-left: 10px;
    }

    /* Área de Entrada */
    #input-area {
      background-color: var(--input-bg);
      padding: 10px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid var(--border-color);
      padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* Ajuste para iPhones nuevos */
    }

    #user-input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid var(--border-color);
      border-radius: 25px;
      font-size: 16px; /* Evita zoom automático en iOS */
      outline: none;
      transition: border-color 0.2s;
    }

    #user-input:focus {
      border-color: #93c5fd;
    }

    #send-btn {
      background-color: var(--user-msg-bg);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 25px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    #send-btn:active {
      background-color: #1d4ed8;
    }

    #send-btn:disabled {
      background-color: #cbd5e1;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <header>
    Gemini 3.5 Flash <br>
    <span id="status">Prueba de conexión (Escrita)</span>
  </header>
  
  <div id="chat-container">
    <div class="message bot">¡Hola! Esta es una prueba de chat escrito. Escribe algo abajo para verificar si tu clave de API gratuita conecta correctamente desde GitHub Pages en tu celular. No usaré voz en esta prueba.</div>
  </div>
  
  <div id="input-area">
    <input type="text" id="user-input" placeholder="Escribe tu mensaje aquí..." autofocus>
    <button id="send-btn">Enviar</button>
  </div>

  <script type="module">
    // Importación compatible y estable para navegadores móviles
    import { GoogleGenerativeAI } from 'https://esm.run/@google/generative-ai';

    // Tu API Key gratuita activa
    const API_KEY = 'AQ.Ab8RN6LmKV8hIUJrfARzGH75rbbXxHRJHaPmXFz2snE4XyW_Rg';
    const genAI = new GoogleGenerativeAI(API_KEY);

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusDiv = document.getElementById('status');

    async function enviarMensaje() {
      const texto = userInput.value.trim();
      if (!texto || sendBtn.disabled) return;

      // 1. Renderizar mensaje del usuario
      agregarMensaje(texto, 'user');
      userInput.value = '';
      
      // 2. Bloquear entrada y mostrar estado de carga
      sendBtn.disabled = true;
      statusDiv.textContent = "Gemini está pensando...";
      const typingId = agregarIndicadorCarga();

      try {
        // 3. Conectar con el modelo
        const model = genAI.getGenerativeModel({ model: 'gemini-3.5-flash' });
        
        const result = await model.generateContent(texto);
        const response = await result.response;
        const respuestaIA = response.text();
        
        // 4. Eliminar carga y renderizar respuesta
        removerIndicadorCarga(typingId);
        agregarMensaje(respuestaIA, 'bot');
        statusDiv.textContent = "Conexión exitosa";

      } catch (error) {
        // 5. Manejo de errores de conexión
        removerIndicadorCarga(typingId);
        console.error("Error de Gemini:", error);
        
        agregarMensaje(`Lo siento, hubo un error de conexión con la IA. Detalles: ${error.message}`, 'bot');
        statusDiv.textContent = "Error de conexión";
      } finally {
        // 6. Reactivar entrada
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    // Funciones auxiliares de interfaz
    function agregarMensaje(texto, remitente) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', remitente);
      msgDiv.innerText = texto;
      chatContainer.appendChild(msgDiv);
      desplazarAbajo();
    }

    function agregarIndicadorCarga() {
      const id = 'typing-' + Date.now();
      const loadDiv = document.createElement('div');
      loadDiv.id = id;
      loadDiv.classList.add('typing-indicator');
      loadDiv.innerText = "Gemini está escribiendo...";
      chatContainer.appendChild(loadDiv);
      desplazarAbajo();
      return id;
    }

    function removerIndicadorCarga(id) {
      const element = document.getElementById(id);
      if (element) element.remove();
    }

    function desplazarAbajo() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Eventos de control
    sendBtn.addEventListener('click', enviarMensaje);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') enviarMensaje();
    });
  </script>
</body>
</html>
