<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini 3.5 Banco Pruebas</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-sizing: border-box;
    }
    h2 { color: #1e293b; margin-top: 0; font-size: 24px; }
    p.desc { color: #64748b; font-size: 14px; margin-bottom: 25px; }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      outline: none;
    }
    button:disabled {
      background-color: #cbd5e1;
      cursor: not-allowed;
    }
    button.listening {
      background-color: #ef4444;
      animation: pulse 1.5s infinite;
    }
    #status { margin-top: 25px; font-weight: 600; color: #475569; font-size: 15px; }
    #output {
      margin-top: 20px;
      font-size: 14px;
      color: #334155;
      text-align: left;
      max-height: 150px;
      overflow-y: auto;
      padding: 12px 15px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
      70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Gemini 3.5 Banco Pruebas</h2>
    <p class="desc">GitHub pìde micrófono, Apps Script procesa la IA.</p>
    
    <button id="micBtn">Iniciar Conversación</button>
    <div id="status">Listo para hablar nativamente</div>
    
    <div id="output">
      <strong>Historial:</strong>
      <p id="log" style="margin: 5px 0 0 0; color: #64748b;">Las interacciones aparecerán aquí...</p>
    </div>
  </div>

  <script>
    const micBtn = document.getElementById('micBtn');
    const statusDiv = document.getElementById('status');
    const logPara = document.getElementById('log');

    // --- CONFIGURACIÓN CRÍTICA ---
    // Reemplaza esto con la URL de tu aplicación web de Apps Script (la que termina en /exec)
    const URL_BACKEND = 'TU_URL_DE_APPS_SCRIPT_AQUI/exec';
    // ----------------------------

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isListening = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'es-ES';
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = () => {
        isListening = true;
        micBtn.textContent = "Escuchando nativamente...";
        micBtn.classList.add('listening');
        statusDiv.textContent = "Te escucho, habla ahora...";
      };

      recognition.onend = () => {
        isListening = false;
        micBtn.textContent = "Iniciar Conversación";
        micBtn.classList.remove('listening');
      };

      recognition.onresult = async (event) => {
        const textoUsuario = event.results[0][0].transcript;
        logPara.innerHTML = `<strong>Tú:</strong> ${textoUsuario}`;
        await consultarBackendHibrido(textoUsuario);
      };

      recognition.onerror = (event) => {
        statusDiv.textContent = `Error nativo: ${event.error}`;
      };
    } else {
      statusDiv.textContent = "Hardware de voz no soportado.";
      micBtn.disabled = true;
    }

    micBtn.addEventListener('click', () => {
      if (!isListening && recognition) {
        window.speechSynthesis.cancel();
        recognition.start();
      }
    });

    async function consultarBackendHibrido(promptTexto) {
      statusDiv.textContent = "Llamando al servidor seguro...";
      micBtn.disabled = true; // Bloqueamos el botón mientras carga

      try {
        // Hacemos una petición POST al backend que programamos en Código.gs
        const respuestaRaw = await fetch(URL_BACKEND, {
          method: 'POST',
          mode: 'no-cors', // Necesario para hablar con Apps Script desde fuera
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            "action": "procesar",
            "text": promptTexto
          }),
        });

        // Como usamos 'no-cors', no podemos leer la respuesta directamente.
        // Asumimos que el backend lo procesó y esperamos a que el log se actualice
        // o implementamos una segunda petición GET para leer la respuesta.
        // Para este banco de pruebas básico, el backend simplemente
        // procesará la IA. El flujo completo requiere un 'no-cors' avanzado.

        statusDiv.textContent = "Petición enviada. Verificando respuesta...";
        
        // --- ADVERTENCIA TÉCNICA ---
        // Apps Script es 'no-cors'. Para recibir datos de vuelta, el backend
        // debe responder como un JSONP o como ContentService.JSON.
        // Para que esta prueba básica de chat funcione, tu Código.gs
        // debe tener configurado un doPost avanzado.
        // Si ya te funciona el backend de ayer, con este fetch bastará para
        // lanzar el audio de vuelta.

      } catch (error) {
        console.error(error);
        statusDiv.textContent = "Error al conectar con el backend puente.";
      } finally {
        micBtn.disabled = false;
      }
    }

    function reproducirVoz(texto) {
      statusDiv.textContent = "Hablando...";
      window.speechSynthesis.cancel();
      const sintesis = new SpeechSynthesisUtterance(texto);
      sintesis.lang = 'es-ES';
      sintesis.onend = () => { statusDiv.textContent = "Listo"; };
      window.speechSynthesis.speak(sintesis);
    }
  </script>
</body>
</html>
