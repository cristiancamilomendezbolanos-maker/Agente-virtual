<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba de Puente de Texto</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #e2e8f0;
      color: #1e293b;
    }
    #chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 80%;
      font-size: 15px;
      line-height: 1.4;
    }
    .user { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .bot { background: white; color: #334155; align-self: flex-start; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom-left-radius: 4px; }
    #input-area {
      padding: 15px;
      background: white;
      display: flex;
      gap: 10px;
      border-top: 1px solid #e2e8f0;
    }
    input { flex: 1; padding: 12px 18px; border: 1px solid #cbd5e1; border-radius: 25px; outline: none; font-size: 16px; }
    button { background: #2563eb; color: white; border: none; padding: 0 22px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 15px; }
    button:disabled { background: #cbd5e1; }
    #status { font-size: 12px; color: #64748b; text-align: center; padding: 6px; background: #e2e8f0; font-weight: 500; }
  </style>
</head>
<body>

  <header>Validación del Puente (Escrito)</header>
  <div id="status">Esperando mensaje...</div>
  
  <div id="chat-box">
    <div class="msg bot">¡Hola! Escribe una pregunta de prueba aquí abajo. El sistema la enviará a tu URL de Apps Script para comprobar que el puente responde correctamente.</div>
  </div>
  
  <div id="input-area">
    <input type="text" id="userInput" placeholder="Escribe un mensaje aquí..." autofocus>
    <button id="sendBtn">Enviar</button>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');

    // URL de Apps Script ya vinculada
    const URL_PUENTE_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbwkrmpYjD4qUhCMqHyD8DXUdRMdfTAbJJKrxuKt6JB0ElXuLMY-rOY9GL33cXrLwSq3uQ/exec';

    async function enviarAlPuente() {
      const texto = userInput.value.trim();
      if (!texto) return;

      // Deshabilitar botón e imprimir texto del usuario
      sendBtn.disabled = true;
      agregarMensaje(texto, 'user');
      userInput.value = '';
      statusDiv.textContent = "Conectando con Apps Script...";

      try {
        // Enviar la petición POST con el texto hacia la URL de Google
        const response = await fetch(URL_PUENTE_APPS_SCRIPT, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain' }, 
          body: JSON.stringify({ texto: texto })
        });

        const data = await response.json();
        
        // Mostrar la respuesta devuelta por la IA a través del servidor
        agregarMensaje(data.respuesta, 'bot');
        statusDiv.textContent = "Respuesta recibida";

      } catch (error) {
        console.error("Error capturado:", error);
        statusDiv.textContent = "Error en el puente.";
        agregarMensaje("Error al conectar con Apps Script. Asegúrate de que la implementación en Apps Script esté como pública ('Cualquier persona') y que hayas guardado los cambios.", 'bot');
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    function agregarMensaje(texto, remitente) {
      const div = document.createElement('div');
      div.classList.add('msg', remitente);
      div.innerText = texto;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    sendBtn.addEventListener('click', enviarAlPuente);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarAlPuente(); });
  </script>
</body>
</html>
